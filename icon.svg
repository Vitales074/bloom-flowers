<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#d18a8a"/>
      <stop offset="0.55" stop-color="#b86565"/>
      <stop offset="1" stop-color="#9c4f4f"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.32" cy="0.26" r="0.85">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.34"/>
      <stop offset="0.5" stop-color="#ffffff" stop-opacity="0.05"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="outer" cx="0.5" cy="0.32" r="0.75">
      <stop offset="0" stop-color="#fff4ee"/>
      <stop offset="1" stop-color="#f0c3cb"/>
    </radialGradient>
    <radialGradient id="mid" cx="0.5" cy="0.34" r="0.72">
      <stop offset="0" stop-color="#ffeef0"/>
      <stop offset="1" stop-color="#e7a9b3"/>
    </radialGradient>
    <radialGradient id="inner" cx="0.5" cy="0.4" r="0.7">
      <stop offset="0" stop-color="#ffe2e6"/>
      <stop offset="1" stop-color="#d98a98"/>
    </radialGradient>
    <radialGradient id="core" cx="0.5" cy="0.4" r="0.6">
      <stop offset="0" stop-color="#f7d264"/>
      <stop offset="1" stop-color="#e2a233"/>
    </radialGradient>
    <linearGradient id="leaf" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#7fa07f"/>
      <stop offset="1" stop-color="#5c7f63"/>
    </linearGradient>
  </defs>

  <rect width="512" height="512" rx="116" fill="url(#bg)"/>
  <rect width="512" height="512" rx="116" fill="url(#glow)"/>

  <!-- leaves -->
  <g fill="url(#leaf)" opacity="0.9">
    <ellipse cx="256" cy="356" rx="34" ry="78" transform="rotate(-28 256 356)"/>
    <ellipse cx="256" cy="356" rx="34" ry="78" transform="rotate(28 256 356)"/>
  </g>

  <!-- peony bloom -->
  <g transform="translate(256 250)">
    <!-- outer petals (8) -->
    <g fill="url(#outer)">
      <ellipse cx="0" cy="-92" rx="48" ry="86"/>
      <ellipse cx="0" cy="-92" rx="48" ry="86" transform="rotate(45)"/>
      <ellipse cx="0" cy="-92" rx="48" ry="86" transform="rotate(90)"/>
      <ellipse cx="0" cy="-92" rx="48" ry="86" transform="rotate(135)"/>
      <ellipse cx="0" cy="-92" rx="48" ry="86" transform="rotate(180)"/>
      <ellipse cx="0" cy="-92" rx="48" ry="86" transform="rotate(225)"/>
      <ellipse cx="0" cy="-92" rx="48" ry="86" transform="rotate(270)"/>
      <ellipse cx="0" cy="-92" rx="48" ry="86" transform="rotate(315)"/>
    </g>
    <!-- mid petals (6, offset) -->
    <g fill="url(#mid)">
      <ellipse cx="0" cy="-58" rx="38" ry="60" transform="rotate(22)"/>
      <ellipse cx="0" cy="-58" rx="38" ry="60" transform="rotate(82)"/>
      <ellipse cx="0" cy="-58" rx="38" ry="60" transform="rotate(142)"/>
      <ellipse cx="0" cy="-58" rx="38" ry="60" transform="rotate(202)"/>
      <ellipse cx="0" cy="-58" rx="38" ry="60" transform="rotate(262)"/>
      <ellipse cx="0" cy="-58" rx="38" ry="60" transform="rotate(322)"/>
    </g>
    <!-- inner petals (5) -->
    <g fill="url(#inner)">
      <ellipse cx="0" cy="-30" rx="27" ry="38"/>
      <ellipse cx="0" cy="-30" rx="27" ry="38" transform="rotate(72)"/>
      <ellipse cx="0" cy="-30" rx="27" ry="38" transform="rotate(144)"/>
      <ellipse cx="0" cy="-30" rx="27" ry="38" transform="rotate(216)"/>
      <ellipse cx="0" cy="-30" rx="27" ry="38" transform="rotate(288)"/>
    </g>
    <!-- golden core -->
    <circle cx="0" cy="0" r="26" fill="url(#core)"/>
  </g>
</svg>
